<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Pink background -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="#EC4899"/>

  <!-- === LEFT HALF OF BANKNOTE === -->
  <path d="
    M80,190
    L253,190
    L253,210
    C248,218 258,226 250,234
    C258,242 248,250 253,258
    C248,266 258,274 253,282
    L253,340
    L80,340
    Z
  " fill="#2DD4A0" stroke="#0D9468" stroke-width="2"/>
  <!-- Left border stripe -->
  <rect x="88" y="198" width="30" height="134" rx="3" fill="#0D9468" opacity="0.2"/>
  <!-- Left circle ornament -->
  <circle cx="155" cy="265" r="30" fill="none" stroke="#0D9468" stroke-width="2" opacity="0.3"/>
  <circle cx="155" cy="265" r="20" fill="none" stroke="#0D9468" stroke-width="1.2" opacity="0.2"/>
  <!-- Dollar sign left -->
  <text x="155" y="274" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#0D9468" opacity="0.4" text-anchor="middle">$</text>
  <!-- Left lines -->
  <line x1="195" y1="240" x2="240" y2="240" stroke="#0D9468" stroke-width="1.5" opacity="0.2"/>
  <line x1="195" y1="252" x2="240" y2="252" stroke="#0D9468" stroke-width="1.5" opacity="0.2"/>
  <line x1="195" y1="276" x2="240" y2="276" stroke="#0D9468" stroke-width="1.5" opacity="0.2"/>
  <line x1="195" y1="288" x2="240" y2="288" stroke="#0D9468" stroke-width="1.5" opacity="0.2"/>

  <!-- === RIGHT HALF OF BANKNOTE (offset right a bit) === -->
  <path d="
    M432,190
    L259,190
    L259,210
    C264,218 254,226 262,234
    C254,242 264,250 259,258
    C264,266 254,274 259,282
    L259,340
    L432,340
    Z
  " fill="#34D399" stroke="#0D9468" stroke-width="2"/>
  <!-- Right border stripe -->
  <rect x="394" y="198" width="30" height="134" rx="3" fill="#0D9468" opacity="0.2"/>
  <!-- Right circle ornament -->
  <circle cx="357" cy="265" r="30" fill="none" stroke="#0D9468" stroke-width="2" opacity="0.3"/>
  <circle cx="357" cy="265" r="20" fill="none" stroke="#0D9468" stroke-width="1.2" opacity="0.2"/>
  <!-- Dollar sign right -->
  <text x="357" y="274" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#0D9468" opacity="0.4" text-anchor="middle">$</text>
  <!-- Right lines -->
  <line x1="272" y1="240" x2="317" y2="240" stroke="#0D9468" stroke-width="1.5" opacity="0.2"/>
  <line x1="272" y1="252" x2="317" y2="252" stroke="#0D9468" stroke-width="1.5" opacity="0.2"/>
  <line x1="272" y1="276" x2="317" y2="276" stroke="#0D9468" stroke-width="1.5" opacity="0.2"/>
  <line x1="272" y1="288" x2="317" y2="288" stroke="#0D9468" stroke-width="1.5" opacity="0.2"/>

  <!-- === TEAR LINE (jagged dark line in the gap) === -->
  <path d="
    M256,190
    L253,200 L259,210 L252,220 L260,230 L253,240 L259,250
    L252,260 L260,270 L254,282
  " fill="none" stroke="#9F1239" stroke-width="2" opacity="0.6"/>

  <!-- === LIGHTNING BOLT from top down to middle of banknote === -->
  <!-- Outer glow -->
  <path d="
    M270,30
    L240,130
    L275,120
    L238,200
    L280,188
    L256,265
  " fill="none" stroke="#FBBF24" stroke-width="14" opacity="0.3"/>
  <!-- Main bolt body -->
  <path d="
    M270,30
    L240,130
    L275,120
    L238,200
    L280,188
    L256,265
  " fill="none" stroke="#FBBF24" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bright core -->
  <path d="
    M270,30
    L240,130
    L275,120
    L238,200
    L280,188
    L256,265
  " fill="none" stroke="#FEF9C3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === IMPACT FLASH at strike point === -->
  <circle cx="256" cy="265" r="22" fill="#FBBF24" opacity="0.35"/>
  <circle cx="256" cy="265" r="10" fill="#FEF9C3" opacity="0.6"/>

  <!-- Sparks -->
  <line x1="256" y1="265" x2="225" y2="245" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="265" x2="290" y2="248" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="265" x2="232" y2="280" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="265" x2="282" y2="278" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="265" x2="240" y2="250" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="265" x2="276" y2="255" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Spark dots -->
  <circle cx="218" cy="240" r="3.5" fill="#FDE68A"/>
  <circle cx="296" cy="243" r="3" fill="#FEF3C7"/>
  <circle cx="228" cy="285" r="2.5" fill="#FDE68A"/>
  <circle cx="288" cy="282" r="3" fill="#FEF3C7"/>

  <!-- Torn paper bits flying -->
  <rect x="220" y="230" width="10" height="6" rx="1" fill="#6EE7B7" opacity="0.7" transform="rotate(-25,225,233)"/>
  <rect x="285" y="235" width="8" height="5" rx="1" fill="#6EE7B7" opacity="0.6" transform="rotate(20,289,237)"/>
  <rect x="235" y="282" width="7" height="4" rx="1" fill="#6EE7B7" opacity="0.5" transform="rotate(-40,238,284)"/>

  <!-- === TEXT === -->
  <text x="256" y="418" font-family="Arial,Helvetica,sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="5">FAIR PAY</text>
  <text x="256" y="450" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#FDF2F8" text-anchor="middle" letter-spacing="3" opacity="0.75">CHIA TIEN · KHONG CHIA RE</text>
</svg>
